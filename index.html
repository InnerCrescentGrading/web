<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner Crescent | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* Mantenemos tu estilo original que es impecable */
        body { 
            background: #020205;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(30, 30, 70, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(50, 20, 50, 0.3) 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/stardust.png'); 
            background-attachment: fixed;
            color: #d4af37;
            font-family: 'Cinzel', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .logo-placeholder { width: 200px; height: 180px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; }
        .header-section { text-align: center; margin-bottom: 40px; }
        .header-section h1 {
            font-size: 2.8em;
            letter-spacing: 10px;
            margin: 0;
            background: linear-gradient(to bottom, #cfad4a 0%, #fcf6ba 40%, #bf953f 60%, #8a6e2f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
            font-weight: 700;
        }

        .subtitle { font-family: 'Inter', sans-serif; font-size: 0.9em; letter-spacing: 5px; color: #d4af37; opacity: 0.8; margin-top: 10px; text-transform: uppercase; }
        .search-container { background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(212, 175, 55, 0.4); padding: 50px 40px; max-width: 480px; width: 100%; box-sizing: border-box; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        input { width: 100%; padding: 20px; margin-bottom: 30px; background: #000; border: 1px solid #222; color: #fff; text-align: center; font-size: 1.6em; letter-spacing: 6px; outline: none; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        input:focus { border-color: #d4af37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .gold-button { width: 100%; padding: 22px; background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 50%, #aa771c 100%); color: #000; font-weight: 800; border: none; cursor: pointer; font-size: 1em; letter-spacing: 3px; text-transform: uppercase; transition: transform 0.2s; }
        .gold-button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        #result { display: none; margin-top: 30px; width: 100%; max-width: 550px; }
        .slab-frame { background: #000; border: 2px solid #d4af37; border-radius: 4px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,1); }
        .slab-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #d4af37; background: linear-gradient(to right, #050505, #111); }
        .grade-box { text-align: center; border-left: 1px solid #333; padding-left: 25px; }
        .grade-val { font-size: 3.8em; color: #fff; font-weight: bold; line-height: 1; }
        .grade-lab { color: #d4af37; font-size: 0.7em; letter-spacing: 2px; }
        .card-photo { width: 100%; display: block; }
        .slab-info { padding: 40px; background: #050505; text-align: left; }
        .card-name { color: #fff; font-size: 1.8em; margin: 0 0 10px 0; letter-spacing: 1px; }
        .justif-text { color: #777; font-size: 0.95em; line-height: 1.8; font-family: 'Inter', sans-serif; font-weight: 300; }
    </style>
</head>
<body>

<div class="logo-placeholder">
    <img src="logo_ic.png" alt="Inner Crescent" style="max-width: 280px; height: auto; mix-blend-mode: screen; filter: drop-shadow(0 0 20px rgba(255, 232, 24, 0.137));">
</div>

    <div class="header-section">
        <h1>INNER CRESCENT</h1>
        <div class="subtitle">Official Authentication</div>
    </div>

    <div class="search-container" id="searchBox">
        <input type="text" id="certId" placeholder="IC000000" maxlength="8">
        <button id="btnBuscar" class="gold-button">Verify Authentication</button>
        <p id="status" style="margin-top: 25px; font-size: 0.8em; font-family: 'Inter'; letter-spacing: 2px;"></p>
    </div>

    <div id="result">
        <div class="slab-frame">
            <div class="slab-header">
                <div>
                    <div style="color: #fff; font-size: 1.3em; letter-spacing: 3px;">INNER CRESCENT</div>
                    <div class="subtitle" style="font-size: 0.6em; margin: 0;">Official Certification</div>
                </div>
                <div class="grade-box">
                    <div id="resGrade" class="grade-val"></div>
                    <div id="resLabel" class="grade-lab"></div>
                </div>
            </div>
            
            <img id="resImg" class="card-photo" src="">

            <div class="slab-info">
                <h2 id="resName" class="card-name"></h2>
                <div id="resIC" style="color: #d4af37; font-size: 0.85em; margin-bottom: 20px; letter-spacing: 2px;"></div>
                <p id="resJust" class="justif-text"></p>
            </div>
        </div>
        <button onclick="location.reload()" style="margin-top: 30px; background: none; border: none; color: #444; width: 100%; cursor: pointer; letter-spacing: 3px; font-family: 'Inter'; font-size: 0.8em;">NEW VERIFICATION</button>
    </div>

    <script>
        // LÓGICA DE BÚSQUEDA EN EL ARCHIVO JSON
        document.getElementById('btnBuscar').onclick = async () => {
            const id = document.getElementById('certId').value.trim().toUpperCase();
            const status = document.getElementById('status');
            
            if (id.length < 3) {
                status.innerText = "ENTER A VALID ID";
                return;
            }

            status.innerText = "⭐ SEARCHING IN ARCHIVES...";
            status.style.color = "#d4af37";
            
            try {
                // Buscamos el archivo JSON que creaste en tu GitHub
                const response = await fetch('certificados.json');
                const certificados = await response.json();

                if (certificados[id]) {
                    const data = certificados[id];
                    document.getElementById('searchBox').style.display = 'none';
                    document.getElementById('result').style.display = 'block';
                    
                    document.getElementById('resName').innerText = data.nombre;
                    document.getElementById('resGrade').innerText = data.grado;
                    document.getElementById('resLabel').innerText = "CERTIFIED GRADE";
                    document.getElementById('resIC').innerText = "CERTIFICATE ID: " + id;
                    document.getElementById('resJust').innerText = "Authenticity verified by Inner Crescent. Language: " + data.idioma + ". Date of certification: " + data.fecha;
                    document.getElementById('resImg').src = data.imagen;
                } else {
                    status.innerText = "CERTIFICATE NOT FOUND";
                    status.style.color = "#ff4444";
                }
            } catch (e) { 
                console.error(e); 
                status.innerText = "ERROR CONNECTING TO DATABASE";
            }
        };
    </script>
</body>
</html>
